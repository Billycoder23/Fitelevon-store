<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitElevon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#0f0b1f;
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 8%;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

.logo{
  font-size:28px;
  font-weight:700;
  background:linear-gradient(90deg,#a855f7,#6366f1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav ul{
  display:flex;
  gap:30px;
  list-style:none;
}

nav a{
  text-decoration:none;
  color:white;
  font-weight:500;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(120deg,#1a103d,#0f0b1f);
}

.hero h1{
  font-size:55px;
  line-height:1.2;
}

.hero span{
  background:linear-gradient(90deg,#a855f7,#6366f1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn{
  margin-top:25px;
  padding:15px 35px;
  background:linear-gradient(90deg,#a855f7,#6366f1);
  border:none;
  border-radius:30px;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* PRODUCTS */
.products{
  padding:80px 8%;
  text-align:center;
}

.products h2{
  font-size:40px;
  margin-bottom:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.card{
  background:#1a103d;
  padding:25px;
  border-radius:20px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  border-radius:15px;
}

.card h3{
  margin:15px 0;
}

.price{
  color:#a855f7;
  font-size:20px;
  margin-bottom:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#0b0820;
  margin-top:50px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">FitElevon</div>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Shop</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <div>
    <h1>Build Your <span>Dream Physique</span></h1>
    <p>Premium Gym & Boxing Essentials</p>
    <button class="btn">Shop Now</button>
  </div>
</section>

<section class="products">
  <h2>Popular Products</h2>
  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e">
      <h3>Gym Gloves</h3>
      <div class="price">₹799</div>
      <button class="btn">Buy Now</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1594737625785-c847b35a1c19">
      <h3>Protein Powder</h3>
      <div class="price">₹2499</div>
      <button class="btn">Buy Now</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61">
      <h3>Boxing Gloves</h3>
      <div class="price">₹1899</div>
      <button class="btn">Buy Now</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
      <h3>Resistance Bands</h3>
      <div class="price">₹699</div>
      <button class="btn">Buy Now</button>
    </div>

  </div>
</section>

<footer>
  © 2026 FitElevon. All Rights Reserved.
</footer>

</body>
</html>
