<!DOCTYPE html>
<html>
<head>
  <title>FitElevon Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      font-family: Arial;
      background: linear-gradient(120deg,#5f2cff,#a64dff);
      color:white;
    }
    header{
      background:black;
      padding:15px;
      font-size:22px;
      font-weight:bold;
    }
    .products{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:15px;
      padding:15px;
    }
    .card{
      background:white;
      color:black;
      border-radius:10px;
      padding:10px;
    }
    button{
      background:#5f2cff;
      color:white;
      border:none;
      padding:10px;
      width:100%;
      border-radius:5px;
    }
  </style>
</head>

<body>

<header>FitElevon Store</header>

<div class="products">

  <div class="card">
    <h3>Protein Powder</h3>
    <p>₹1999</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Boxing Gloves</h3>
    <p>₹999</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Gym T-Shirt</h3>
    <p>₹699</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <h3>Dumbbells</h3>
    <p>₹1499</p>
    <button>Buy Now</button>
  </div>

</div>

</body>
  </html>
